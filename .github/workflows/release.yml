name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.target }}

      - name: Build binary
        run: cargo build --release --features plugins
        env:
          CARGO_BUILD_TARGET: ${{ matrix.target }}

      - name: Archive binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/nginx-lint dist/
          cd dist
          tar czf ../nginx-lint-${{ matrix.target }}.tar.gz nginx-lint

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nginx-lint-${{ matrix.target }}
          path: nginx-lint-${{ matrix.target }}.tar.gz

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: nginx-lint-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          generate_release_notes: true
          files: nginx-lint-*.tar.gz

  publish-crates:
    name: Publish to crates.io
    needs: docker
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: release
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4
        id: auth
      - name: Publish nginx-lint-parser
        run: cargo publish -p nginx-lint-parser
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
      - name: Wait for crates.io index
        run: sleep 30
      - name: Publish nginx-lint-common
        run: cargo publish -p nginx-lint-common
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
      - name: Wait for crates.io index
        run: sleep 30
      - name: Publish nginx-lint-plugin
        run: cargo publish -p nginx-lint-plugin
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  build-npm:
    name: Build npm package
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: wasm-parser
      - name: Install wasm-tools
        run: cargo install wasm-tools
      - name: Build parser WASM component
        run: |
          cargo build --manifest-path crates/nginx-lint-parser/Cargo.toml \
            --target wasm32-unknown-unknown --release --features wasm
          wasm-tools component new \
            target/wasm32-unknown-unknown/release/nginx_lint_parser.wasm \
            -o target/wasm32-unknown-unknown/release/nginx_lint_parser.component.wasm
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
      - name: Install dependencies
        run: npm install
        working-directory: plugins/typescript/nginx-lint-plugin
      - name: Transpile parser WASM to JS
        run: npx jco transpile ../../../target/wasm32-unknown-unknown/release/nginx_lint_parser.component.wasm -o wasm/parser --name parser
        working-directory: plugins/typescript/nginx-lint-plugin
      - name: Build package
        run: npm run build
        working-directory: plugins/typescript/nginx-lint-plugin
      - name: Upload dist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-package-dist
          path: plugins/typescript/nginx-lint-plugin/dist/
      - name: Upload wit
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-package-wit
          path: plugins/typescript/nginx-lint-plugin/wit/
      - name: Upload wasm
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-package-wasm
          path: plugins/typescript/nginx-lint-plugin/wasm/

  publish-npm:
    name: Publish to npm
    needs: [docker, build-npm]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: release
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-package-dist
          path: plugins/typescript/nginx-lint-plugin/dist/
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-package-wit
          path: plugins/typescript/nginx-lint-plugin/wit/
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-package-wasm
          path: plugins/typescript/nginx-lint-plugin/wasm/
      - name: Publish
        run: npm publish --provenance --access public --ignore-scripts
        working-directory: plugins/typescript/nginx-lint-plugin

  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: nginx-lint-x86_64-unknown-linux-gnu
          path: /tmp/artifacts
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: nginx-lint-aarch64-unknown-linux-gnu
          path: /tmp/artifacts
      - name: Prepare build context
        run: |
          mkdir -p /tmp/docker-context
          cd /tmp/artifacts
          tar xzf nginx-lint-x86_64-unknown-linux-gnu.tar.gz
          mv nginx-lint /tmp/docker-context/nginx-lint-amd64
          tar xzf nginx-lint-aarch64-unknown-linux-gnu.tar.gz
          mv nginx-lint /tmp/docker-context/nginx-lint-arm64
          cat > /tmp/docker-context/Dockerfile <<'DOCKERFILE'
          FROM debian:trixie-slim
          ARG TARGETARCH
          COPY nginx-lint-${TARGETARCH} /usr/local/bin/nginx-lint
          ENTRYPOINT ["nginx-lint"]
          DOCKERFILE
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: /tmp/docker-context
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
