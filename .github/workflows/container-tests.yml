name: Container Tests

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/container-tests.yml"
      - "plugins/builtin/**/tests/container_test.rs"
      - "plugins/builtin/**/tests/container_test/**"
      - "crates/nginx-lint-plugin/src/container_testing.rs"

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
  # renovate: datasource=docker depName=nginx
  NGINX_LATEST_VERSION: "1.31"

jobs:
  generate-matrix:
    name: Generate Matrix
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        run: |
          LATEST="${{ env.NGINX_LATEST_VERSION }}"
          MAJOR="${LATEST%%.*}"
          MINOR="${LATEST##*.}"
          PREVIOUS="$MAJOR.$((MINOR - 1))"
          OLDER="$MAJOR.$((MINOR - 2))"
          echo "matrix={\"nginx-image\":[\"nginx:$LATEST\",\"nginx:$PREVIOUS\",\"nginx:$OLDER\",\"openresty/openresty:resolute\",\"ghcr.io/walf443/freenginx-image:1.31\"]}" >> "$GITHUB_OUTPUT"

  container-tests:
    name: Container Tests (${{ matrix.nginx-image }})
    needs: generate-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: "container-tests"

      - name: Pull image
        run: docker pull ${{ matrix.nginx-image }}

      - name: Show nginx version
        run: |
          docker run --rm --entrypoint /bin/sh ${{ matrix.nginx-image }} -c \
            "nginx -v 2>&1 || openresty -v 2>&1 \
             || /usr/local/nginx/sbin/nginx -v 2>&1 \
             || /usr/local/openresty/bin/openresty -v 2>&1"

      - name: Pull CoreDNS image
        run: docker pull coredns/coredns:latest

      - name: Pull PHP-FPM image
        run: docker pull php:8.3-fpm

      - name: Run container tests
        env:
          NGINX_IMAGE: ${{ matrix.nginx-image }}
        run: |
          failed_plugins=""
          passed=0
          failed=0
          for dir in plugins/builtin/*/*/; do
            if [ -f "$dir/tests/container_test.rs" ] || [ -f "$dir/tests/container_test/main.rs" ]; then
              name=$(basename "$dir")
              pkg=$(grep '^name = ' "$dir/Cargo.toml" | head -1 | sed 's/name = "\(.*\)"/\1/')
              echo "::group::$name (${{ matrix.nginx-image }})"
              if cargo test -p "$pkg" --test container_test -- --ignored; then
                echo "✅ $name passed"
                passed=$((passed + 1))
              else
                echo "❌ $name failed"
                failed=$((failed + 1))
                failed_plugins="$failed_plugins $name"
                echo "::error title=$name failed::Container test for $name failed with ${{ matrix.nginx-image }}"
              fi
              echo "::endgroup::"
            fi
          done
          echo ""
          echo "=== Summary (${{ matrix.nginx-image }}) ==="
          echo "Passed: $passed"
          echo "Failed: $failed"
          if [ -n "$failed_plugins" ]; then
            echo ""
            echo "Failed plugins:"
            for p in $failed_plugins; do
              echo "  - $p"
            done
            exit 1
          fi
